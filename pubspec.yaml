name: app_test
description: "Traffic Violation Detector — YOLOv11n + ByteTrack + ML Kit OCR"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  ultralytics_yolo: ^0.4.2
  permission_handler: ^12.0.3

  # OCR — replaces PaddleOCR
  google_mlkit_text_recognition: ^0.13.0

  # Camera access for cropped frames (helmet / plate YOLO.predict)
  camera: ^0.11.1

  # Image manipulation in Dart (crop, resize)
  image: ^4.3.0

  # Local storage for violation records
  path_provider: ^2.1.4

  # JSON serialisation helpers
  shared_preferences: ^2.3.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/yolov11n.tflite
    - assets/models/vehicle_yolov11n.tflite
    - assets/models/helmet_yolov11n.tflite
    - assets/models/plate_yolov11n.tflite
    - assets/models/road_yolov11n.tflite
